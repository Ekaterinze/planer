name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      
      - name: Install minimal system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev
          pip3 install --upgrade Cython==0.29.33 buildozer
      
      - name: Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-
      
      # Устанавливаем Java 17 как основную (для следующих шагов)
      - name: Set Java 17 as default
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/temurin-17-jdk-amd64/bin" >> $GITHUB_PATH
      
      # Сборка универсального APK (32 + 64 бит)
      - name: Build APK
        run: |
          # Проверка: должна быть Java 17
          echo "=== Java version ==="
          java -version
          echo "=== JAVA_HOME ==="
          echo $JAVA_HOME
          echo "=== Buildozer version ==="
          buildozer --version
          
          # Запуск сборки
          buildozer android debug

          mv bin/*.apk bin/planer-debug.apk 2>/dev/null || true
      
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: planer-apk
          path: bin/planer-debug.apk
          if-no-files-found: error

      # Рилиз:
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/planer-debug.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}