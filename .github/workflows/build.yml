name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      
      - name: Install minimal system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev
          pip3 install --upgrade Cython==0.29.33 buildozer
      
      - name: Cache Buildozer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-
      
      - name: Set Java 17 as default
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/temurin-17-jdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Android SDK
        run: |
          SDK_DIR=~/.buildozer/android/platform/android-sdk
          
          # 1. Создаем целевую структуру до конца
          mkdir -p $SDK_DIR/cmdline-tools/latest
          
          # 2. Скачиваем во временную папку
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          
          # 3. Распаковываем
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm commandlinetools-linux-11076708_latest.zip
          
          # 4. Копируем содержимое распакованной папки в latest
          # Внутри /tmp/cmdline-tools лежат bin, lib, NOTICE.txt и т.д.
          # Мы копируем их все внутрь $SDK_DIR/cmdline-tools/latest
          cp -r /tmp/cmdline-tools/* $SDK_DIR/cmdline-tools/latest/
          
          # 5. Очищаем временные файлы
          rm -rf /tmp/cmdline-tools
          
          # 6. Настраиваем переменные окружения
          export ANDROID_SDK_ROOT=$SDK_DIR
          echo "ANDROID_SDK_ROOT=$SDK_DIR" >> $GITHUB_ENV
          echo "$SDK_DIR/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Fix SDK Structure for Buildozer
        run: |
          SDK_DIR=~/.buildozer/android/platform/android-sdk
          
          # Создаем папку tools/bin (игнорируем ошибку, если уже есть)
          mkdir -p $SDK_DIR/tools/bin
          
          # Создаем символические ссылки с флагом -f (принудительно)
          ln -sf $SDK_DIR/cmdline-tools/latest/bin/sdkmanager $SDK_DIR/tools/bin/sdkmanager
          ln -sf $SDK_DIR/cmdline-tools/latest/bin/avdmanager $SDK_DIR/tools/bin/avdmanager
          
          # Проверка, что ссылки созданы верно
          ls -la $SDK_DIR/tools/bin/

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses
      
      - name: Install required build-tools
        run: |
          sdkmanager "platform-tools" "build-tools;33.0.2" "platforms;android-33"
      
      - name: Build APK
        run: |
          echo "=== Java version ==="
          java -version
          echo "=== ANDROID_SDK_ROOT ==="
          echo $ANDROID_SDK_ROOT
          echo "=== Buildozer version ==="
          buildozer --version
          
          # Запускаем сборку
          buildozer android debug
          
          # Переименовываем APK для удобства
          mv bin/*.apk bin/planer-debug.apk 2>/dev/null || true
      
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: planer-apk
          path: bin/planer-debug.apk
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/planer-debug.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}